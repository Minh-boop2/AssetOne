{% extends 'main.html' %}

{% block content %}
<link
  rel="stylesheet"
  href="{{ url_for('static', filename='css/manage/manage.css') }}"
/>

<link
  rel="stylesheet"
  href="{{ url_for('static', filename='css/manage/manage_edit.css') }}?v=1"
/>

<section class="manage-edit-page">
  <div class="manage-edit-wrap">
    {% set action_id = user.db_id if user.db_id is defined and user.db_id else user.id %}

    <div class="edit-topbar">
      <a href="{{ url_for('user_detail', id=action_id) }}" class="edit-back-link">
        <i class="fas fa-arrow-left"></i>
        <span>Hủy và quay lại</span>
      </a>
    </div>

    <h1 class="edit-page-title">Chỉnh sửa hồ sơ nhân sự</h1>

    <div class="edit-card">
      <form method="POST" action="{{ url_for('user_edit', id=action_id) }}" class="edit-form">
        <div class="edit-card-header">
          <div class="edit-header-inner">
            <div class="edit-code-box">
              <span class="edit-code-label">Mã nhân viên</span>
              <span class="edit-code-value">{{ user.id }}</span>
            </div>

            <div class="edit-name-box">
              <label class="edit-label">Họ và tên nhân viên</label>
              <input
                type="text"
                name="name"
                value="{{ user.name }}"
                required
                class="edit-input name-input"
              />
            </div>
          </div>
        </div>

        <div class="edit-card-body">
          <div class="edit-grid">
            <div class="edit-column">
              <h4 class="edit-section-title">
                <i class="fas fa-user-circle"></i>
                <span>Thông tin cá nhân & liên hệ</span>
              </h4>

              <div class="edit-field-list">
                <div class="edit-field">
                  <label class="edit-label">Email công vụ</label>
                  <input
                    type="email"
                    name="email"
                    value="{{ user.email }}"
                    required
                    class="edit-input"
                  />
                </div>

                <div class="edit-field">
                  <label class="edit-label">Số điện thoại</label>
                  <input
                    type="text"
                    name="phone"
                    value="{{ user.phone if user.phone else '' }}"
                    class="edit-input"
                  />
                </div>

                <div class="edit-field">
                  <label class="edit-label">Trạng thái tài khoản</label>
                  <select name="status" class="edit-select">
                    {% for status in user_status %}
                      {% set status_value = status.value if status.value is defined else status %}
                      {% set status_label = status.label if status.label is defined else status %}
                      <option
                        value="{{ status_value }}"
                        {% if user.status_code == status_value or user.status == status_label or user.status == status_value %}selected{% endif %}
                      >
                        {{ status_label }}
                      </option>
                    {% endfor %}
                  </select>
                </div>

                <div class="edit-field">
                  <label class="edit-label">Mật khẩu mới</label>
                  <input
                    type="password"
                    name="password"
                    placeholder="Để trống nếu không đổi mật khẩu"
                    class="edit-input"
                  />
                </div>
              </div>
            </div>

            <div class="edit-column">
              <h4 class="edit-section-title soft">
                <i class="fas fa-briefcase"></i>
                <span>Vị trí & công tác</span>
              </h4>

              <div class="edit-field-list">
                <div class="edit-field">
                  <label class="edit-label">Phòng ban / Đơn vị</label>
                  <select name="department" class="edit-select">
                    {% for d in departments %}
                      <option value="{{ d }}" {% if user.dept == d %}selected{% endif %}>
                        {{ d }}
                      </option>
                    {% endfor %}
                  </select>
                </div>

                <div class="edit-field">
                  <label class="edit-label">Vai trò hệ thống</label>
                  <select name="role" class="edit-select role-select">
                    {% for r in roles %}
                      {% set role_value = r.value if r.value is defined else r %}
                      {% set role_label = r.label if r.label is defined else r %}
                      <option
                        value="{{ role_value }}"
                        {% if user.role_code == role_value or user.role == role_label or user.role == role_value %}selected{% endif %}
                      >
                        {{ role_label }}
                      </option>
                    {% endfor %}
                  </select>
                </div>

                <div class="edit-field">
                  <label class="edit-label">Vị trí tầng</label>
                  <select name="floor" class="edit-select">
                    <option value="">Chưa sắp xếp</option>
                    {% for f in floors %}
                      <option value="{{ f }}" {% if user.position == f %}selected{% endif %}>
                        {{ f }}
                      </option>
                    {% endfor %}
                  </select>
                </div>

                <div class="edit-field">
                  <label class="edit-label">Ngày tham gia</label>
                  <input
                    type="text"
                    value="{{ user.join_date or user.created_at or 'Chưa có dữ liệu' }}"
                    readonly
                    disabled
                    class="edit-input readonly-input"
                  />
                </div>
              </div>
            </div>
          </div>

          <div class="edit-actions">
            <a href="{{ url_for('user_detail', id=action_id) }}" class="edit-btn edit-btn-cancel">
              Hủy bỏ
            </a>

            <button type="submit" class="edit-btn edit-btn-submit">
              <i class="fas fa-save"></i>
              Lưu thay đổi
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>
</section>
{% endblock %}
