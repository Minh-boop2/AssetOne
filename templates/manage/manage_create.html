{% extends 'main.html' %} {% block content %}
<link
  rel="stylesheet"
  href="{{ url_for('static', filename='css/manage/manage.css') }}"
/>
<link
  rel="stylesheet"
  href="{{ url_for('static', filename='css/manage/manage_create.css') }}?v=3"
/>

<section class="manage-create-page">
  <div class="manage-create-wrap">
    <div class="create-topbar">
      <a href="{{ url_for('manage') }}" class="create-back-link">
        <span class="create-back-icon">&laquo;</span>
        <span>Quay lại</span>
      </a>
    </div>

    <div class="create-header">
      <h1>Thêm nhân sự mới</h1>
    </div>

    <div class="create-card">
      <form
        action="{{ url_for('manage_create') }}"
        method="POST"
        class="create-form"
      >
        <input type="hidden" name="emp_id" value="{{ auto_id }}" />

        <div class="create-grid">
          <div class="create-column">
            <div class="section-title">
              <i class="fas fa-id-card"></i>
              <span>Định danh nhân sự</span>
            </div>

            <div class="employee-code-card">
              <div class="employee-code-top">
                <span class="verify-badge">
                  <i class="fas fa-check-circle"></i>
                  Đã xác thực
                </span>
                <span class="unique-label">ID UNIQUE</span>
              </div>

              <div class="employee-code-main">
                <div>
                  <span class="employee-code-label">Mã nhân viên</span>
                  <strong id="emp_id_display">{{ auto_id }}</strong>
                </div>

                <button
                  type="button"
                  class="copy-btn"
                  onclick="copyId()"
                  title="Sao chép mã nhân viên"
                >
                  <i class="far fa-copy"></i>
                </button>
              </div>
            </div>

            <div class="form-group">
              <label>Họ và tên nhân viên</label>
              <input
                type="text"
                name="name"
                placeholder="Ví dụ: Nguyễn Văn A"
                required
              />
            </div>

            <div class="form-group">
              <label>Email công vụ</label>
              <input
                type="email"
                name="email"
                placeholder="username@hoasen.edu.vn"
                required
              />
            </div>

            <div class="form-group">
              <label>Số điện thoại liên lạc</label>
              <input
                type="tel"
                name="phone"
                placeholder="Ví dụ: 090xxxxxxx"
                required
              />
            </div>

            <div class="form-group">
              <label>Mật khẩu đăng nhập </label>
              <div class="password-field">
                <input
                  type="password"
                  name="password"
                  id="passwordInput"
                  placeholder="Nhập mật khẩu cho nhân viên tối thiểu 6 ký t"
                  minlength="6"
                  required
                />
                <button
                  type="button"
                  class="password-toggle"
                  onclick="togglePassword()"
                  title="Ẩn / hiện mật khẩu"
                >
                  <i class="fas fa-eye" id="passwordIcon"></i>
                </button>
              </div>
            </div>
          </div>

          <div class="create-column">
            <div class="section-title">
              <i class="fas fa-briefcase"></i>
              <span>Thông tin công tác</span>
            </div>

            <div class="form-group">
              <label>Phòng ban / Đơn vị</label>
              <select name="department" required>
                <option value="" disabled selected>-- Chọn phòng ban --</option>
                {% for dept in departments %}
                <option value="{{ dept }}">{{ dept }}</option>
                {% endfor %}
              </select>
            </div>

            <div class="form-group">
              <label>Vai trò hệ thống</label>
              <select name="role" required>
                <option value="" disabled selected>-- Chọn vai trò --</option>
                {% for r in roles %} {% set role_value = r.value if r.value is
                defined else r %} {% set role_label = r.label if r.label is
                defined else r %}
                <option value="{{ role_value }}">{{ role_label }}</option>
                {% endfor %}
              </select>
            </div>

            <div class="form-group">
              <label>Vị trí tầng</label>
              <select name="floor" required>
                <option value="" disabled selected>
                  -- Chọn tầng làm việc --
                </option>
                {% for f in floors %}
                <option value="{{ f }}">{{ f }}</option>
                {% endfor %}
              </select>
            </div>

            <div class="readonly-info-card">
              <div>
                <span>Trạng thái mặc định</span>
                <strong>Hoạt động</strong>
              </div>
              <div class="green-dot"></div>
            </div>

            <div class="readonly-info-card">
              <div>
                <span>Ngày tham gia</span>
                <strong id="today_display">Tự động theo giờ Việt Nam</strong>
              </div>
              <i class="fas fa-calendar-alt"></i>
            </div>

            <div class="readonly-info-card">
              <div>
                <span>Cách đăng nhập</span>
                <strong>Email + mật khẩu vừa tạo</strong>
              </div>
              <i class="fas fa-user-lock"></i>
            </div>
          </div>
        </div>

        <div class="create-footer">
          <a href="{{ url_for('manage') }}" class="btn-cancel"> Hủy bỏ </a>

          <button type="submit" class="btn-submit">
            <i class="fas fa-user-plus"></i>
            Xác nhận thêm mới
          </button>
        </div>
      </form>
    </div>
  </div>
</section>

<script>
  function copyId() {
    const code = document.getElementById("emp_id_display").innerText;

    navigator.clipboard
      .writeText(code)
      .then(() => {
        alert("Đã sao chép mã nhân viên: " + code);
      })
      .catch((err) => {
        console.error("Lỗi khi sao chép:", err);
      });
  }

  function togglePassword() {
    const input = document.getElementById("passwordInput");
    const icon = document.getElementById("passwordIcon");

    if (!input) return;

    const isPassword = input.type === "password";
    input.type = isPassword ? "text" : "password";

    if (icon) {
      icon.className = isPassword ? "fas fa-eye-slash" : "fas fa-eye";
    }
  }

  function formatVietnamDate() {
    const now = new Date();

    const formatted = now.toLocaleString("vi-VN", {
      timeZone: "Asia/Ho_Chi_Minh",
      day: "2-digit",
      month: "2-digit",
      year: "numeric",
      hour: "2-digit",
      minute: "2-digit",
    });

    const display = document.getElementById("today_display");

    if (display) {
      display.innerText = formatted;
    }
  }

  window.addEventListener("DOMContentLoaded", formatVietnamDate);
</script>
{% endblock %}
