<!doctype html>
<html>
  <head>
    <title>IT Asset Dashboard</title>
    <style>
      body {
        font-family: Arial;
        margin: 0;
        background: #f4f6f9;
      }

      .navbar {
        background: #2c3e50;
        color: white;
        padding: 15px;
        font-size: 20px;
      }

      .container {
        padding: 20px;
      }

      .cards {
        display: flex;
        gap: 20px;
      }

      .card {
        background: white;
        padding: 20px;
        border-radius: 8px;
        width: 200px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }

      .card h2 {
        margin: 0;
        color: #3498db;
      }

      .card p {
        margin: 5px 0 0;
        color: #777;
      }
    </style>
  </head>

  <body>
    <div class="navbar">IT Asset Management Dashboard</div>

    <div class="container">
      <h1>Dashboard</h1>

      <div class="cards">
        <div class="card">
          <h2>25</h2>
          <p>Total Assets</p>
        </div>

        <div class="card">
          <h2>10</h2>
          <p>In Use</p>
        </div>

        <div class="card">
          <h2>5</h2>
          <p>Maintenance</p>
        </div>
      </div>
    </div>
  </body>
</html>
