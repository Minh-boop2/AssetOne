<div class="table-container">
  <table class="custom-table">
    <thead>
      <tr>
        {% for col in columns %}
        <th>{{ col.label }}</th>
        {% endfor %} {% if actions %}
        <th></th>
        {% endif %}
      </tr>
    </thead>

    <tbody>
      {% for row in data %}
      <tr>
        {% for col in columns %}
        <td>
          {% if col.render %} {{ col.render(row) }} {% else %} {{ row[col.key]
          }} {% endif %}
        </td>
        {% endfor %} {% if actions %}
        <td class="actions">{% include actions %}</td>
        {% endif %}
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
