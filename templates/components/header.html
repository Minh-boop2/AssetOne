<header class="header">
  <div class="header-left">
    <div class="brand-wrap">
      <img
        src="{{ url_for('static', filename='images/hsu-logo.png') }}"
        alt="Hoa Sen University"
        class="brand-logo"
      />
      <div class="brand-text">
        <h1>Quản lý tài sản CNTT</h1>
        <p>Hệ thống quản lý tài sản doanh nghiệp</p>
      </div>
    </div>
  </div>

  <div class="header-right">
    <nav class="header-nav">
      <a
        href="{{ url_for('dashboard_overview') }}"
        class="nav-link {% if request.endpoint == 'dashboard_overview' %}active{% endif %}"
        >Tổng quan</a
      >

      <a
        href="{{ url_for('assets_page') }}"
        class="nav-link {% if request.endpoint == 'assets_page' %}active{% endif %}"
        >Tài sản</a
      >

      <a
        href="{{ url_for('assign_page') }}"
        class="nav-link {% if request.endpoint == 'assign_page' %}active{% endif %}"
        >Cấp phát</a
      >

      <a
        href="{{ url_for('return_page') }}"
        class="nav-link {% if request.endpoint == 'return_page' %}active{% endif %}"
        >Thu hồi</a
      >

      <a
        href="{{ url_for('report_page') }}"
        class="nav-link {% if request.endpoint == 'report_page' %}active{% endif %}"
        >Báo cáo</a
      >
    </nav>

    <div class="header-actions">
      <button
        class="theme-toggle"
        id="themeToggle"
        type="button"
        aria-label="Đổi giao diện"
      >
        <span class="toggle-icon">◐</span>
      </button>

      <div class="user-box">
        <div class="user-avatar">A</div>
        <div class="user-info">
          <span class="user-name">Admin</span>
          <span class="user-role">Quản trị hệ thống</span>
        </div>
      </div>
    </div>
  </div>
</header>

<script>
  (function () {
    const root = document.documentElement;
    const toggleBtn = document.getElementById("themeToggle");
    const savedTheme = localStorage.getItem("theme");

    if (savedTheme === "dark") {
      root.setAttribute("data-theme", "dark");
    }

    toggleBtn?.addEventListener("click", function () {
      const isDark = root.getAttribute("data-theme") === "dark";

      if (isDark) {
        root.removeAttribute("data-theme");
        localStorage.setItem("theme", "light");
      } else {
        root.setAttribute("data-theme", "dark");
        localStorage.setItem("theme", "dark");
      }
    });
  })();
</script>
