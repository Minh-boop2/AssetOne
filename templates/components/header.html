<header class="header">
  <div class="header-left">
    <div class="brand-wrap">
      <img
        src="{{ url_for('static', filename='images/hsu-logo.png') }}"
        alt="Hoa Sen University"
        class="brand-logo"
      />
      <div class="brand-text">
        <h1>Quản lý tài sản CNTT</h1>
        <p>Hệ thống quản lý tài sản doanh nghiệp</p>
      </div>
    </div>
  </div>

  <div class="header-right">
    <nav class="header-nav">
      <a
        href="{{ url_for('dashboard_overview') }}"
        class="nav-link {% if request.endpoint == 'dashboard_overview' %}active{% endif %}"
      >
        Tổng quan
      </a>

      <a
        href="{{ url_for('assets_page') }}"
        class="nav-link {% if request.endpoint == 'assets_page' %}active{% endif %}"
      >
        Tài sản
      </a>

      <a
        href="{{ url_for('assign_page') }}"
        class="nav-link {% if request.endpoint == 'assign_page' %}active{% endif %}"
      >
        Cấp phát
      </a>

      <a
        href="{{ url_for('manage') }}"
        class="nav-link {% if request.endpoint == 'manage' %}active{% endif %}"
      >
        Quản lý
      </a>

      <a
        href="{{ url_for('report_page') }}"
        class="nav-link {% if request.endpoint == 'report_page' %}active{% endif %}"
      >
        Báo cáo
      </a>
    </nav>

    <div class="header-actions">
      <button
        class="theme-toggle"
        id="themeToggle"
        type="button"
        aria-label="Đổi giao diện"
        title="Đổi giao diện"
      >
        <i data-lucide="moon" class="toggle-icon icon-moon"></i>
        <i data-lucide="sun" class="toggle-icon icon-sun"></i>
      </button>

      <div class="user-menu-wrapper" id="userMenuWrapper">
        <button
          class="user-box user-box-trigger"
          id="userMenuTrigger"
          type="button"
        >
          <div class="user-avatar">A</div>
          <div class="user-info">
            <span class="user-name">Admin</span>
            <span class="user-role">Quản trị hệ thống</span>
          </div>
        </button>

        <div class="user-dropdown" id="userDropdown">
          <a href="{{ url_for('profile_page') }}" class="user-dropdown-item">
            Hồ sơ
          </a>
          <a href="" class="user-dropdown-item"> Thống kê </a>
          <a
            href="{{ url_for('login_page') }}"
            class="user-dropdown-item user-dropdown-item--danger"
          >
            Đăng xuất
          </a>
        </div>
      </div>
    </div>
  </div>
</header>

<script>
  (function () {
    const root = document.documentElement;
    const toggleBtn = document.getElementById("themeToggle");
    const savedTheme = localStorage.getItem("theme");

    const userMenuWrapper = document.getElementById("userMenuWrapper");
    const userMenuTrigger = document.getElementById("userMenuTrigger");
    const userDropdown = document.getElementById("userDropdown");

    if (savedTheme === "dark") {
      root.setAttribute("data-theme", "dark");
    } else {
      root.removeAttribute("data-theme");
    }

    if (window.lucide) {
      lucide.createIcons();
    }

    toggleBtn?.addEventListener("click", function () {
      const isDark = root.getAttribute("data-theme") === "dark";

      if (isDark) {
        root.removeAttribute("data-theme");
        localStorage.setItem("theme", "light");
      } else {
        root.setAttribute("data-theme", "dark");
        localStorage.setItem("theme", "dark");
      }
    });

    userMenuTrigger?.addEventListener("click", function (event) {
      event.stopPropagation();
      userMenuWrapper.classList.toggle("open");
    });

    document.addEventListener("click", function (event) {
      if (!userMenuWrapper?.contains(event.target)) {
        userMenuWrapper?.classList.remove("open");
      }
    });

    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape") {
        userMenuWrapper?.classList.remove("open");
      }
    });
  })();
</script>
