<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quên mật khẩu - AssetOne</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login/login.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="dark-theme">
    <div class="theme-toggle" onclick="toggleTheme()">
        <i class="fas fa-moon" id="theme-icon"></i>
    </div>

    <div class="login-card">
        <div class="auth-header">
            <img src="{{ url_for('static', filename='images/hsu-logo.png') }}" class="auth-logo">
            <h2>Khôi phục mật khẩu</h2>
            <p style="color: var(--text-sub); font-size: 14px;">Nhập email của bạn để tiếp tục.</p>
        </div>
        <div class="form-group" style="margin-top: 30px; text-align: left;">
            <label>Email đăng ký</label>
            <input type="email" placeholder="example@hsu.edu.vn">
        </div>
        <button class="btn-login" style="margin-top: 20px;">Gửi yêu cầu</button>
        <div style="margin-top: 25px;">
            <a href="{{ url_for('login_page') }}" style="color: #3b82f6; text-decoration: none; font-size: 14px;">← Quay lại đăng nhập</a>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            if (body.classList.contains('dark-theme')) {
                body.classList.replace('dark-theme', 'light-theme');
                icon.classList.replace('fa-moon', 'fa-sun');
            } else {
                body.classList.replace('light-theme', 'dark-theme');
                icon.classList.replace('fa-sun', 'fa-moon');
            }
        }
    </script>
</body>
</html>
