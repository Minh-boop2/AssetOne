{% extends 'main.html' %} {% block content %}
<link
  rel="stylesheet"
  href="{{ url_for('static', filename='css/login/login.css') }}"
/>

<div class="auth-wrapper">
  <div class="login-card">
    <h3 class="login-title">Quên mật khẩu?</h3>

    <p class="auth-desc">Nhập email đăng ký để khôi phục.</p>

    <form method="POST">
      <div class="form-group">
        <label for="email">Email đăng ký</label>
        <input
          id="email"
          type="email"
          name="email"
          placeholder="example@hsu.edu.vn"
          required
        />
      </div>

      <button type="submit" class="btn-login">Gửi mã xác nhận</button>
    </form>

    <div class="auth-back">
      <a href="{{ url_for('login_page') }}" class="forgot-link">
        ← Quay lại Đăng nhập
      </a>
    </div>
  </div>
</div>
{% endblock %}
