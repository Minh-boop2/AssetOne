<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
    <meta charset="UTF-8">
    <title>Quên mật khẩu - AssetOne</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login/login.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<header class="header">
    <div class="header-left">
        <div class="brand-wrap">
            <img src="{{ url_for('static', filename='images/hsu-logo.png') }}" class="brand-logo">
            <div class="brand-text">
                <h1>Quản lý tài sản CNTT</h1>
                <p>Hệ thống quản lý tài sản doanh nghiệp</p>
            </div>
        </div>
    </div>
    <div class="header-right">
        <button class="theme-toggle" id="themeToggle">
            <i data-lucide="moon" class="icon-moon"></i>
            <i data-lucide="sun" class="icon-sun"></i>
        </button>
    </div>
</header>

<main class="auth-wrapper">
    <div class="login-card">
        <h3 class="login-title" style="font-size: 28px;">Quên mật khẩu?</h3>
        <p style="color: var(--text-sub); margin-bottom: 35px; font-weight: 600;">Nhập email đăng ký để khôi phục.</p>
        
        <form method="POST">
            <div class="form-group">
                <label>Email đăng ký</label>
                <input type="email" name="email" placeholder="example@hsu.edu.vn" required>
            </div>
            <button type="submit" class="btn-login">Gửi mã xác nhận</button>
        </form>
        
        <div style="margin-top: 35px;">
            <a href="{{ url_for('login_page') }}" class="forgot-link">← Quay lại Đăng nhập</a>
        </div>
    </div>
</main>

<script>
    lucide.createIcons();
    const root = document.documentElement;
    const btn = document.getElementById('themeToggle');
    
    const saved = localStorage.getItem('theme') || 'light';
    root.setAttribute('data-theme', saved);

    btn.addEventListener('click', () => {
        const current = root.getAttribute('data-theme');
        const next = current === 'light' ? 'dark' : 'light';
        root.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
    });
</script>
</body>
</html>
