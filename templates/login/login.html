<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>AssetOne - Đăng nhập</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login/login.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="dark-theme">
    <div class="theme-toggle" onclick="toggleTheme()">
        <i class="fas fa-moon" id="theme-icon"></i>
    </div>

    <div class="login-card">
        <div class="auth-header">
            <img src="{{ url_for('static', filename='images/hsu-logo.png') }}" class="auth-logo">
            <div class="system-title">HỆ THỐNG QUẢN LÝ TÀI SẢN CNTT</div>
            <h2>Đăng Nhập</h2>
        </div>
        <form method="POST">
            <div class="form-group" style="text-align: left; margin-bottom: 20px;">
                <label>Username</label>
                <input type="text" name="username" placeholder="admin" required>
            </div>
            <div class="form-group" style="text-align: left; margin-bottom: 20px;">
                <label>Mật khẩu</label>
                <input type="password" name="password" placeholder="••••••" required>
            </div>
            <div class="form-options">
                <div class="remember-group">
                    <input type="checkbox" id="remember">
                    <label for="remember">Ghi nhớ đăng nhập</label>
                </div>
                <a href="{{ url_for('forgot_password') }}" style="color: #3b82f6; text-decoration: none; font-size: 14px;">Quên mật khẩu?</a>
            </div>
            <button type="submit" class="btn-login">Đăng nhập</button>
        </form>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            if (body.classList.contains('dark-theme')) {
                body.classList.replace('dark-theme', 'light-theme');
                icon.classList.replace('fa-moon', 'fa-sun');
            } else {
                body.classList.replace('light-theme', 'dark-theme');
                icon.classList.replace('fa-sun', 'fa-moon');
            }
        }
    </script>
</body>
</html>
