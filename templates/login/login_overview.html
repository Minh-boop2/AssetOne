{% extends 'main.html' %}

{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/login/login.css') }}">

<div class="auth-wrapper">
  <div class="login-card">
    <h3 class="login-title">Đăng Nhập</h3>

    <form
      id="loginForm"
      method="POST"
      action="{{ url_for('login_page') }}"
      autocomplete="off"
      novalidate
    >
      <div class="form-group">
        <label for="email">Gmail</label>
        <input
          id="email"
          type="email"
          name="email"
          placeholder="Nhập Gmail của bạn"
          value="{{ login_email or '' }}"
        />
        <p id="emailError" class="field-error" hidden></p>
      </div>

      <div class="form-group">
        <label for="password">Mật khẩu</label>
        <input
          id="password"
          type="password"
          name="password"
          placeholder="••••••••"
        />
        <p id="passwordError" class="field-error" hidden></p>

        {% if login_error %}
          <p class="login-error">{{ login_error }}</p>
        {% endif %}
      </div>

      <div class="form-options">
        <label class="remember-me" for="remember">
          <input
            id="remember"
            type="checkbox"
            name="remember"
            class="remember-checkbox"
            {% if login_remember %}checked{% endif %}
          />
          <span>Ghi nhớ</span>
        </label>

        <a href="{{ url_for('forgot_password') }}" class="forgot-link">
          Quên mật khẩu?
        </a>
      </div>

      <button type="submit" class="btn-login">Đăng nhập</button>
    </form>
  </div>
</div>

<script>
  (function () {
    const form = document.getElementById("loginForm");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const emailError = document.getElementById("emailError");
    const passwordError = document.getElementById("passwordError");

    function showError(input, errorElement, message) {
      input.classList.add("is-invalid");
      errorElement.textContent = message;
      errorElement.hidden = false;
    }

    function clearError(input, errorElement) {
      input.classList.remove("is-invalid");
      errorElement.textContent = "";
      errorElement.hidden = true;
    }

    emailInput.addEventListener("input", function () {
      clearError(emailInput, emailError);
    });

    passwordInput.addEventListener("input", function () {
      clearError(passwordInput, passwordError);
    });

    form.addEventListener("submit", function (event) {
      let hasError = false;

      const emailValue = emailInput.value.trim();
      const passwordValue = passwordInput.value.trim();

      clearError(emailInput, emailError);
      clearError(passwordInput, passwordError);

      if (!emailValue) {
        showError(emailInput, emailError, "Nhập Gmail");
        hasError = true;
      } else if (!emailInput.checkValidity()) {
        showError(emailInput, emailError, "Gmail không đúng định dạng");
        hasError = true;
      }

      if (!passwordValue) {
        showError(passwordInput, passwordError, "Nhập mật khẩu");
        hasError = true;
      }

      if (hasError) {
        event.preventDefault();

        if (!emailValue || !emailInput.checkValidity()) {
          emailInput.focus();
        } else {
          passwordInput.focus();
        }
      }
    });
  })();
</script>

{% endblock %}
