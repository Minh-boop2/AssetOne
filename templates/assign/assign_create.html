{% extends 'main.html' %}
{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/assgin/assign.css') }}">

<section class="dashboard-overview">
    <div class="overview-container">
        <div class="page-shell page-shell-sm">
            <div class="page-header">
                <div>
                    <div class="page-kicker">Cấp phát</div>
                    <h2>➕ Cấp phát tài sản mới</h2>
                    <p>Admin thực hiện bàn giao thiết bị trực tiếp cho nhân viên.</p>
                </div>
                <a href="{{ url_for('assign_page') }}" class="task-btn toolbar-btn-secondary">
                    Quay lại
                </a>
            </div>

            <form action="{{ url_for('assign_create') }}" method="POST" class="assign-form-grid">
                <div class="form-group full">
                    <label>Chọn tài sản từ kho</label>
                    <select name="asset_name" required>
                        <option value="" disabled selected>-- Nhấn để chọn thiết bị --</option>
                        {% for item in inventory %}
                            <option value="{{ item.name }}">{{ item.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group full">
                    <label>Họ tên người nhận</label>
                    <input type="text" name="receiver" required placeholder="Ví dụ: Nguyễn Văn A">
                </div>

                <div class="form-actions full">
                    <button type="submit" class="task-btn task-btn-primary">
                        Xác nhận bàn giao
                    </button>
                    <a href="{{ url_for('assign_page') }}" class="task-btn toolbar-btn-secondary">
                        Hủy
                    </a>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
