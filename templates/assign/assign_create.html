{% extends 'main.html' %}
{% block content %}
<section class="dashboard-overview">
    <div class="overview-container" style="max-width: 600px; margin: 40px auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
        <h2 style="margin-bottom: 10px;">➕ Cấp phát tài sản mới</h2>
        <p style="color: #64748b; margin-bottom: 30px;">Admin thực hiện bàn giao thiết bị trực tiếp cho nhân viên.</p>

        <form action="{{ url_for('assign_create') }}" method="POST">
            <div style="margin-bottom: 20px;">
                <label style="display: block; font-weight: bold; margin-bottom: 8px;">Chọn tài sản từ kho:</label>
                <select name="asset_name" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
                    <option value="" disabled selected>-- Nhấn để chọn thiết bị --</option>
                    {% for item in inventory %}
                        <option value="{{ item.name }}">{{ item.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div style="margin-bottom: 25px;">
                <label style="display: block; font-weight: bold; margin-bottom: 8px;">Họ tên người nhận:</label>
                <input type="text" name="receiver" required placeholder="Ví dụ: Nguyễn Văn A" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
            </div>

            <div style="display: flex; gap: 10px;">
                <button type="submit" class="task-btn task-btn-primary" style="flex: 2; height: 45px;">Xác nhận bàn giao</button>
                <a href="{{ url_for('assign_page') }}" class="task-btn" style="flex: 1; text-align: center; line-height: 45px; text-decoration: none; background: #f1f5f9; color: #475569;">Hủy</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
