{% extends 'main.html' %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/assgin/assign.css') }}">

<section class="assign-create-page">
    <div class="assets-page__header">
        <h1 class="assets-page__title">Tạo phiếu cấp phát mới</h1>
        <p style="color: var(--text-soft); font-size: 14px;">Mã tài sản được hệ thống xác thực duy nhất (Unique ID)</p>
    </div>

    <div class="form-container" style="max-width: 1000px; margin: 0 auto; padding: 35px; border-radius: 20px;">
        <form action="{{ url_for('assign_create') }}" method="POST">
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px;">
                
                <div class="form-section">
                    <h3 style="color: var(--hsu-blue);"><i class="fas fa-tag"></i> ĐỊNH DANH & THIẾT BỊ</h3>
                    
                    <div class="filter-item" style="margin-bottom: 25px;">
                        <label class="filter-label">MÃ TÀI SẢN HỆ THỐNG</label>
                        <div class="asset-code-card">
                            <div class="asset-code-header">
                                <span class="badge status-hoanthanh" style="font-size: 10px; padding: 4px 12px;">
                                    <i class="fas fa-check-circle"></i> ĐÃ XÁC THỰC
                                </span>
                                <span style="font-family: monospace; font-size: 12px; color: var(--text-soft);">Sao Chép Mã</span>
                            </div>
                            <div class="asset-code-body">
                                <span class="asset-code-display" id="random_code">{{ suggested_code }}</span>
                                <button type="button" class="copy-btn" onclick="copyToClipboard()" title="Sao chép mã">
                                    <i class="fas fa-copy"></i>
                                </button>
                            </div>
                            <input type="hidden" name="asset_code" value="{{ suggested_code }}">
                            <div class="asset-code-footer">
                                <p><i class="fas fa-info-circle"></i> Mã này là duy nhất và không bị trùng lặp trong hệ thống.</p>
                            </div>
                        </div>
                    </div>

                    <div class="filter-item" style="margin-bottom: 20px;">
                        <label class="filter-label">CHỌN THIẾT BỊ TRONG KHO</label>
                        <select name="asset_name" id="asset_select" class="filter-control" required style="appearance: auto;">
                            <option value="" disabled selected>-- Chọn thiết bị --</option>
                            {% for item in inventory %}
                                <option value="{{ item.name }}" data-spec="{{ item.spec }}" data-type="{{ item.type }}">{{ item.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="filter-item">
                        <label class="filter-label">CẤU HÌNH CHI TIẾT (TỰ ĐIỀN)</label>
                        <textarea name="spec" id="spec_area" class="filter-control" 
                                  style="height: 140px; padding: 15px; resize: none; font-family: 'Consolas', monospace;" 
                                  placeholder="Thông số sẽ tự hiển thị..."></textarea>
                    </div>
                </div>

                <div class="form-section">
                    <h3 style="color: var(--hsu-blue);"><i class="fas fa-user-check"></i> THÔNG TIN BÀN GIAO</h3>

                    <div class="filter-item" style="margin-bottom: 20px;">
                        <label class="filter-label">LOẠI TÀI SẢN TƯƠNG ỨNG</label>
                        <select name="type" id="type_select" class="filter-control" required style="appearance: auto;">
                            <option value="" disabled selected>-- Chọn loại --</option>
                            {% set types = [] %}
                            {% for item in inventory %}
                                {% if item.type not in types %}
                                    {% set _ = types.append(item.type) %}
                                    <option value="{{ item.type }}">{{ item.type }}</option>
                                {% endif %}
                            {% endfor %}
                        </select>
                    </div>

                    <div class="filter-item" style="margin-bottom: 20px;">
                        <label class="filter-label">HỌ TÊN NGƯỜI NHẬN</label>
                        <input type="text" name="receiver" class="filter-control" placeholder="Nhập tên nhân viên..." required>
                    </div>

                    <div class="filter-item" style="margin-bottom: 20px;">
                        <label class="filter-label">PHÒNG BAN</label>
                        <select name="department" class="filter-control" required style="appearance: auto;">
                            {% for dept in departments %}
                                <option value="{{ dept }}">{{ dept }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="filter-item" style="margin-bottom: 20px;">
                        <label class="filter-label">VỊ TRÍ LẮP ĐẶT (TẦNG/KHO)</label>
                        <select name="location" class="filter-control" required style="appearance: auto;">
                            <option value="" disabled selected>-- Chọn vị trí --</option>
                            {% for loc in locations %}
                                <option value="{{ loc }}">{{ loc }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="filter-item">
                            <label class="filter-label">NGÀY BÀN GIAO</label>
                            <input type="date" name="date" id="current_date" class="filter-control" required>
                        </div>
                        <div class="filter-item">
                            <label class="filter-label" style="color: var(--hsu-red);">NGÀY TRẢ DỰ KIẾN</label>
                            <input type="date" name="return_date" id="return_date" class="filter-control" required>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-actions" style="display: flex; justify-content: flex-end; gap: 15px; margin-top: 40px; padding-top: 25px; border-top: 1px solid var(--border);">
                <a href="{{ url_for('assign_page') }}" class="page-btn" style="text-decoration: none; padding: 12px 30px;">Hủy bỏ</a>
                <button type="submit" class="btn-add-new" style="padding: 12px 45px;">
                    <i class="fas fa-save"></i> LƯU PHIẾU CẤP PHÁT
                </button>
            </div>
        </form>
    </div>
</section>

<script>
    const assetSelect = document.getElementById('asset_select');
    const specArea = document.getElementById('spec_area');
    const typeSelect = document.getElementById('type_select');
    const dateInput = document.getElementById('current_date');
    const returnDateInput = document.getElementById('return_date');

    // Cập nhật cấu hình và Loại khi chọn thiết bị
    assetSelect.addEventListener('change', function() {
        const selectedOption = this.options[this.selectedIndex];
        const spec = selectedOption.getAttribute('data-spec');
        specArea.value = (spec && spec !== "None") ? spec : "Chưa có thông tin cấu hình.";
        
        const typeInStore = selectedOption.getAttribute('data-type');
        if (typeInStore) typeSelect.value = typeInStore;
    });

    // Copy mã tài sản
    function copyToClipboard() {
        const code = document.getElementById('random_code').innerText;
        navigator.clipboard.writeText(code);
        alert('Đã sao chép mã tài sản: ' + code);
    }

    // Set ngày mặc định
    function setDefaultDates() {
        const today = new Date();
        dateInput.valueAsDate = today;

        const nextYear = new Date();
        nextYear.setFullYear(today.getFullYear() + 1);
        returnDateInput.valueAsDate = nextYear;
    }

    dateInput.addEventListener('change', function() {
        const newDate = new Date(this.value);
        if (!isNaN(newDate)) {
            const nextYear = new Date(newDate);
            nextYear.setFullYear(newDate.getFullYear() + 1);
            returnDateInput.valueAsDate = nextYear;
        }
    });

    setDefaultDates();
</script>
{% endblock %}
