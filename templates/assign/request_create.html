{% extends 'main.html' %}
{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/assgin/assign.css') }}">

<section class="dashboard-overview">
    <div class="overview-container">
        <div class="page-shell page-shell-sm page-shell-accent">
            <div class="page-header page-header-center">
                <div>
                    <div class="page-kicker">Yêu cầu mượn</div>
                    <h2>📝 Gửi yêu cầu mượn thiết bị</h2>
                    <p>Yêu cầu sẽ được gửi đến Admin để phê duyệt.</p>
                </div>
            </div>

            <form action="{{ url_for('request_create') }}" method="POST" class="assign-form-grid">
                <div class="form-group full">
                    <label>Thiết bị bạn cần</label>
                    <select name="asset_name" required>
                        <option value="" disabled selected>-- Chọn thiết bị từ kho --</option>
                        {% for item in inventory %}
                            <option value="{{ item.name }}">{{ item.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group full">
                    <label>Họ và tên người mượn</label>
                    <input type="text" name="requester" required placeholder="Ví dụ: Nguyễn Văn A">
                </div>

                <div class="form-actions full">
                    <button type="submit" class="task-btn task-btn-primary">
                        Gửi yêu cầu ngay
                    </button>
                    <a href="{{ url_for('assign_page') }}" class="task-btn toolbar-btn-secondary">
                        Hủy bỏ
                    </a>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
