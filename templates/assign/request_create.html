<link rel="stylesheet" href="assign.css">

<div class="assign-page">
  <div class="page-heading">
    <div class="heading-left">
      <h1>Yêu cầu cấp phát</h1>
      <p>Gửi yêu cầu trang thiết bị phục vụ công việc</p>
    </div>
  </div>

  <div class="content-card" style="max-width: 800px; margin: 0 auto; padding: 30px;">
    <form action="#" method="POST" style="display: flex; flex-direction: column; gap: 20px;">
      
      <div>
        <label style="display: block; margin-bottom: 8px; font-weight: 600;">Người yêu cầu</label>
        <input type="text" value="Nguyễn Văn A (Nhân viên)" readonly style="width: 100%; height: 42px; border: 1px solid var(--border); border-radius: 10px; padding: 0 12px; background: #f3f4f6; cursor: not-allowed;">
      </div>

      <div>
        <label style="display: block; margin-bottom: 8px; font-weight: 600;">Loại sản phẩm cần yêu cầu</label>
        <select style="width: 100%; height: 42px; border: 1px solid var(--border); border-radius: 10px; padding: 0 12px; background: white;">
          <option>-- Chọn loại tài sản --</option>
          <option>Laptop / Máy tính xách tay</option>
          <option>Thiết bị ngoại vi (Chuột, bàn phím, màn hình)</option>
          <option>Thiết bị mạng</option>
          <option>Khác...</option>
        </select>
      </div>

      <div>
        <label style="display: block; margin-bottom: 8px; font-weight: 600;">Lý do yêu cầu cấp phát</label>
        <textarea rows="5" placeholder="Ví dụ: Máy cũ hỏng, nhân viên mới vào làm..." style="width: 100%; border: 1px solid var(--border); border-radius: 10px; padding: 12px; font-family: inherit;"></textarea>
      </div>

      <div style="display: flex; gap: 12px; margin-top: 10px; border-top: 1px solid var(--border); padding-top: 20px;">
        <button type="submit" class="btn btn-primary">Gửi yêu cầu ngay</button>
        <a href="assign_overview.html" class="btn btn-light" style="text-decoration: none;">Quay về danh sách</a>
      </div>

    </form>
  </div>
</div>
