{% extends 'main.html' %}
{% block content %}
<section class="dashboard-overview">
    <div class="overview-container" style="max-width: 600px; margin: 40px auto; background: #fff; padding: 30px; border-radius: 12px; border-top: 5px solid #3b82f6;">
        <h2 style="margin-bottom: 10px;">📝 Gửi yêu cầu mượn thiết bị</h2>
        <p style="color: #64748b; margin-bottom: 30px;">Vui lòng chọn thiết bị, Admin sẽ xem xét phê duyệt sau.</p>

        <form action="{{ url_for('request_create') }}" method="POST">
            <div style="margin-bottom: 20px;">
                <label style="display: block; font-weight: bold; margin-bottom: 8px;">Thiết bị bạn cần:</label>
                <select name="asset_name" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
                    <option value="" disabled selected>-- Danh sách thiết bị sẵn có --</option>
                    {% for item in inventory %}
                        <option value="{{ item.name }}">{{ item.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div style="margin-bottom: 25px;">
                <label style="display: block; font-weight: bold; margin-bottom: 8px;">Tên của bạn:</label>
                <input type="text" name="requester" required placeholder="Nhập họ tên đầy đủ" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
            </div>

            <div style="display: flex; gap: 10px;">
                <button type="submit" class="task-btn task-btn-primary" style="flex: 2; height: 45px; background: #2563eb;">Gửi yêu cầu ngay</button>
                <a href="{{ url_for('assign_page') }}" class="task-btn" style="flex: 1; text-align: center; line-height: 45px; text-decoration: none; color: #64748b;">Quay lại</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
