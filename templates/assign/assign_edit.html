{% extends 'main.html' %}
{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/assgin/assign.css') }}">

<section class="dashboard-overview">
    <div class="overview-container">
        <div class="form-card">
            <div class="form-card-header">
                <div>
                    <h2>Chỉnh sửa cấp phát</h2>
                    <p>Cập nhật trạng thái sử dụng và ghi chú tài sản</p>
                </div>
                <a href="{{ url_for('assign_page') }}" class="task-btn toolbar-btn-secondary">
                    Quay lại
                </a>
            </div>

            <form method="POST" class="assign-form-grid">
                <div class="form-group full">
                    <label>Mã phiếu</label>
                    <input type="text" value="{{ item.id }}" disabled>
                </div>

                <div class="form-group full">
                    <label>Tài sản</label>
                    <input type="text" value="{{ item.asset }}" disabled>
                </div>

                <div class="form-group">
                    <label>Người nhận / người đang dùng</label>
                    <input type="text" name="receiver" value="{{ item.receiver }}" placeholder="Nhập họ tên">
                </div>

                <div class="form-group">
                    <label>Trạng thái</label>
                    <select name="status" required>
                        <option value="Đang sử dụng" {% if item.status == 'Đang sử dụng' %}selected{% endif %}>Đang sử dụng</option>
                        <option value="Báo hỏng" {% if item.status == 'Báo hỏng' %}selected{% endif %}>Báo hỏng</option>
                        <option value="Mất" {% if item.status == 'Mất' %}selected{% endif %}>Mất</option>
                        <option value="Thu hồi" {% if item.status == 'Thu hồi' %}selected{% endif %}>Thu hồi</option>
                        <option value="Hoàn thành" {% if item.status == 'Hoàn thành' %}selected{% endif %}>Hoàn thành</option>
                        <option value="Chờ duyệt" {% if item.status == 'Chờ duyệt' %}selected{% endif %}>Chờ duyệt</option>
                    </select>
                </div>

                <div class="form-group full">
                    <label>Ghi chú</label>
                    <textarea name="note" rows="4" placeholder="Ví dụ: bị lỗi màn hình, đã thu hồi về kho IT...">{{ item.note if item.note else '' }}</textarea>
                </div>

                <div class="form-actions full">
                    <button type="submit" class="task-btn task-btn-primary">Lưu thay đổi</button>
                    <a href="{{ url_for('assign_page') }}" class="task-btn toolbar-btn-secondary">Hủy</a>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
