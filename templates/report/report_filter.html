{# templates/report/report_filter.html #}

<div class="report-filter-section">
    <div class="filter-bar">
        <input type="hidden" name="page" value="1">

        <div class="filter-item filter-item--search">
            <label class="filter-label" for="reportSearch">Tìm kiếm</label>
            <input
                id="reportSearch"
                class="filter-input"
                type="text"
                name="search"
                placeholder="Tìm theo mã báo cáo, tên báo cáo hoặc người báo cáo..."
                value="{{ search_value }}"
                autocomplete="off"
            >
        </div>

        <div class="filter-item">
            <label class="filter-label">Loại báo cáo</label>

            <div class="report-count-select" data-count-select>
                <input
                    type="hidden"
                    class="js-report-filter"
                    name="type"
                    value="{{ selected_type }}"
                >

                <button type="button" class="report-count-select__button">
                    <span class="report-count-select__value">
                        <span class="report-count-select__label">
                            {{ selected_type if selected_type != 'Tất cả' else 'Tất cả loại' }}
                        </span>

                        <span class="report-count-select__count">
                            {{ total_report_count if selected_type == 'Tất cả' else type_counts.get(selected_type, 0) }}
                        </span>
                    </span>

                    <span class="report-count-select__caret">▼</span>
                </button>

                <div class="report-count-select__menu {% if (report_type_options|length + 1) >= 5 %}is-scrollable{% endif %}">
                    <button
                        type="button"
                        class="report-count-select__option {% if selected_type == 'Tất cả' %}is-active{% endif %}"
                        data-value="Tất cả"
                        data-label="Tất cả loại"
                        data-count="{{ total_report_count }}"
                    >
                        <span class="report-count-select__option-label">Tất cả loại</span>
                        <span class="report-count-select__option-count">{{ total_report_count }}</span>
                    </button>

                    {% for item in report_type_options %}
                        <button
                            type="button"
                            class="report-count-select__option {% if selected_type == item %}is-active{% endif %}"
                            data-value="{{ item }}"
                            data-label="{{ item }}"
                            data-count="{{ type_counts.get(item, 0) }}"
                        >
                            <span class="report-count-select__option-label">{{ item }}</span>
                            <span class="report-count-select__option-count">{{ type_counts.get(item, 0) }}</span>
                        </button>
                    {% endfor %}
                </div>
            </div>
        </div>

        <div class="filter-item">
            <label class="filter-label">Phòng ban</label>

            <div class="report-count-select" data-count-select>
                <input
                    type="hidden"
                    class="js-report-filter"
                    name="department"
                    value="{{ selected_dept }}"
                >

                <button type="button" class="report-count-select__button">
                    <span class="report-count-select__value">
                        <span class="report-count-select__label">
                            {{ selected_dept if selected_dept != 'Tất cả' else 'Tất cả phòng' }}
                        </span>

                        <span class="report-count-select__count">
                            {{ total_report_count if selected_dept == 'Tất cả' else department_counts.get(selected_dept, 0) }}
                        </span>
                    </span>

                    <span class="report-count-select__caret">▼</span>
                </button>

                <div class="report-count-select__menu {% if (department_options|length + 1) >= 5 %}is-scrollable{% endif %}">
                    <button
                        type="button"
                        class="report-count-select__option {% if selected_dept == 'Tất cả' %}is-active{% endif %}"
                        data-value="Tất cả"
                        data-label="Tất cả phòng"
                        data-count="{{ total_report_count }}"
                    >
                        <span class="report-count-select__option-label">Tất cả phòng</span>
                        <span class="report-count-select__option-count">{{ total_report_count }}</span>
                    </button>

                    {% for dept in department_options %}
                        <button
                            type="button"
                            class="report-count-select__option {% if selected_dept == dept %}is-active{% endif %}"
                            data-value="{{ dept }}"
                            data-label="{{ dept }}"
                            data-count="{{ department_counts.get(dept, 0) }}"
                        >
                            <span class="report-count-select__option-label">{{ dept }}</span>
                            <span class="report-count-select__option-count">{{ department_counts.get(dept, 0) }}</span>
                        </button>
                    {% endfor %}
                </div>
            </div>
        </div>

        <div class="filter-item">
            <label class="filter-label">Vị trí</label>

            <div class="report-count-select" data-count-select>
                <input
                    type="hidden"
                    class="js-report-filter"
                    name="location"
                    value="{{ selected_location }}"
                >

                <button type="button" class="report-count-select__button">
                    <span class="report-count-select__value">
                        <span class="report-count-select__label">
                            {{ selected_location if selected_location != 'Tất cả' else 'Tất cả vị trí' }}
                        </span>

                        <span class="report-count-select__count">
                            {{ total_report_count if selected_location == 'Tất cả' else location_counts.get(selected_location, 0) }}
                        </span>
                    </span>

                    <span class="report-count-select__caret">▼</span>
                </button>

                <div class="report-count-select__menu {% if (location_options|length + 1) >= 5 %}is-scrollable{% endif %}">
                    <button
                        type="button"
                        class="report-count-select__option {% if selected_location == 'Tất cả' %}is-active{% endif %}"
                        data-value="Tất cả"
                        data-label="Tất cả vị trí"
                        data-count="{{ total_report_count }}"
                    >
                        <span class="report-count-select__option-label">Tất cả vị trí</span>
                        <span class="report-count-select__option-count">{{ total_report_count }}</span>
                    </button>

                    {% for location in location_options %}
                        <button
                            type="button"
                            class="report-count-select__option {% if selected_location == location %}is-active{% endif %}"
                            data-value="{{ location }}"
                            data-label="{{ location }}"
                            data-count="{{ location_counts.get(location, 0) }}"
                        >
                            <span class="report-count-select__option-label">{{ location }}</span>
                            <span class="report-count-select__option-count">{{ location_counts.get(location, 0) }}</span>
                        </button>
                    {% endfor %}
                </div>
            </div>
        </div>

        <div class="filter-item">
            <label class="filter-label">Trạng thái</label>

            <div class="report-count-select" data-count-select>
                <input
                    type="hidden"
                    class="js-report-filter"
                    name="status"
                    value="{{ selected_status }}"
                >

                <button type="button" class="report-count-select__button">
                    <span class="report-count-select__value">
                        <span class="report-count-select__label">
                            {{ selected_status if selected_status != 'Tất cả' else 'Tất cả trạng thái' }}
                        </span>

                        <span class="report-count-select__count">
                            {{ total_report_count if selected_status == 'Tất cả' else status_counts.get(selected_status, 0) }}
                        </span>
                    </span>

                    <span class="report-count-select__caret">▼</span>
                </button>

                <div class="report-count-select__menu">
                    <button
                        type="button"
                        class="report-count-select__option {% if selected_status == 'Tất cả' %}is-active{% endif %}"
                        data-value="Tất cả"
                        data-label="Tất cả trạng thái"
                        data-count="{{ total_report_count }}"
                    >
                        <span class="report-count-select__option-label">Tất cả trạng thái</span>
                        <span class="report-count-select__option-count">{{ total_report_count }}</span>
                    </button>

                    {% for item in report_status_options %}
                        <button
                            type="button"
                            class="report-count-select__option {% if selected_status == item %}is-active{% endif %}"
                            data-value="{{ item }}"
                            data-label="{{ item }}"
                            data-count="{{ status_counts.get(item, 0) }}"
                        >
                            <span class="report-count-select__option-label">{{ item }}</span>
                            <span class="report-count-select__option-count">{{ status_counts.get(item, 0) }}</span>
                        </button>
                    {% endfor %}
                </div>
            </div>
        </div>

        <div class="filter-actions">
            <a
                href="{{ url_for('report_page') }}"
                class="btn-reset {% if not has_active_filter %}is-hidden{% endif %}"
                title="Xóa bộ lọc"
                aria-label="Xóa bộ lọc"
            >
                ×
            </a>

            <a
                href="{{ url_for('new_report_page') }}"
                class="action-btn action-btn--primary action-btn--add"
            >
                + Báo cáo mới
            </a>
        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const AUTO_SEARCH_DELAY = 500;
    let autoSearchTimer = null;

    const filterSection = document.querySelector(".report-filter-section");
    const reportSearchInput = document.getElementById("reportSearch");

    function getReportFilterForm() {
        if (!filterSection) return null;

        return filterSection.closest("form");
    }

    function resetReportPageToFirst() {
        if (!filterSection) return;

        const pageInput = filterSection.querySelector('input[name="page"]');

        if (pageInput) {
            pageInput.value = "1";
        }
    }

    function submitReportFilters() {
        if (!filterSection) return;

        resetReportPageToFirst();

        const filterForm = getReportFilterForm();

        if (filterForm) {
            if (typeof filterForm.requestSubmit === "function") {
                filterForm.requestSubmit();
            } else {
                filterForm.submit();
            }

            return;
        }

        const params = new URLSearchParams();

        filterSection.querySelectorAll("input[name]").forEach(function (input) {
            params.set(input.name, input.value || "");
        });

        const targetUrl = window.location.pathname + "?" + params.toString();

        window.location.href = targetUrl;
    }

    function scheduleReportAutoSearch() {
        clearTimeout(autoSearchTimer);

        autoSearchTimer = setTimeout(function () {
            submitReportFilters();
        }, AUTO_SEARCH_DELAY);
    }

    function submitReportFiltersNow() {
        clearTimeout(autoSearchTimer);
        submitReportFilters();
    }

    document.querySelectorAll("[data-count-select]").forEach(function (selectBox) {
        const trigger = selectBox.querySelector(".report-count-select__button");
        const hiddenInput = selectBox.querySelector('input[type="hidden"]');
        const label = selectBox.querySelector(".report-count-select__label");
        const count = selectBox.querySelector(".report-count-select__count");
        const options = selectBox.querySelectorAll(".report-count-select__option");

        if (!trigger || !hiddenInput) return;

        trigger.addEventListener("click", function (event) {
            event.preventDefault();
            event.stopPropagation();

            document.querySelectorAll("[data-count-select]").forEach(function (otherSelectBox) {
                if (otherSelectBox !== selectBox) {
                    otherSelectBox.classList.remove("open");
                }
            });

            selectBox.classList.toggle("open");
        });

        options.forEach(function (option) {
            option.addEventListener("click", function (event) {
                event.preventDefault();
                event.stopPropagation();

                hiddenInput.value = option.dataset.value || "Tất cả";

                if (label) {
                    label.textContent = option.dataset.label || "";
                }

                if (count) {
                    count.textContent = option.dataset.count || "";
                }

                options.forEach(function (item) {
                    item.classList.remove("is-active");
                });

                option.classList.add("is-active");
                selectBox.classList.remove("open");

                hiddenInput.dispatchEvent(new Event("change", { bubbles: true }));
            });
        });
    });

    if (reportSearchInput) {
        reportSearchInput.addEventListener("input", function () {
            scheduleReportAutoSearch();
        });

        reportSearchInput.addEventListener("keydown", function (event) {
            if (event.key === "Enter") {
                event.preventDefault();
                submitReportFiltersNow();
            }
        });
    }

    document.querySelectorAll(".js-report-filter").forEach(function (filterInput) {
        filterInput.addEventListener("change", function () {
            scheduleReportAutoSearch();
        });
    });

    document.addEventListener("click", function () {
        document.querySelectorAll("[data-count-select]").forEach(function (selectBox) {
            selectBox.classList.remove("open");
        });
    });

    document.addEventListener("keydown", function (event) {
        if (event.key === "Escape") {
            document.querySelectorAll("[data-count-select]").forEach(function (selectBox) {
                selectBox.classList.remove("open");
            });
        }
    });
});
</script>
